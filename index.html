<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Showcase</title>
    <style>
        body {
            background: url('starry_background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
        }
        .game-tile {
            background-color: black;
            border-radius: 10px;
            padding: 15px;
            transition: transform 0.2s;
        }
        .game-tile:hover {
            transform: scale(1.05);
        }
        .loading-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 2em;
            justify-content: center;
            align-items: center;
        }
        .search-bar {
            margin: 20px;
            padding: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loading-screen">Loading...</div>
    <input type="text" class="search-bar" placeholder="Search for a game..."/>
    <div class="game-grid">
        <div class="game-tile">Flappy Bird</div>
        <div class="game-tile">FNAF 1</div>
        <div class="game-tile">FNAF 2</div>
        <div class="game-tile">FNAF 3</div>
        <div class="game-tile">FNAF 4</div>
        <div class="game-tile">FNF</div>
        <div class="game-tile">FNF QT Mod</div>
    </div>
    <script>
        window.onload = function() {
            document.getElementById('loading-screen').style.display = 'flex';
            setTimeout(function() {
                document.getElementById('loading-screen').style.display = 'none';
            }, 5000);
        };
    </script>
</body>
</html>
