<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Collection</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }  
        #loading { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background-color: #000; 
            color: #fff; 
            font-size: 24px; 
            z-index: 9999;
        }  
        #main { display: none; padding: 20px; }  
        #search-bar { margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .game-tile { border: 1px solid #ccc; padding: 10px; text-align: center; transition: transform 0.3s; }
        .game-tile:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div id="loading">Loading... Please wait.</div>
    <div id="main">
        <input type="text" id="search-bar" placeholder="Search games...">
        <div class="grid" id="game-tiles">
            <div class="game-tile"><h3>Game 1</h3></div>
            <div class="game-tile"><h3>Game 2</h3></div>
            <div class="game-tile"><h3>Game 3</h3></div>
            <div class="game-tile"><h3>Game 4</h3></div>
        </div>
    </div>
    <script>
        window.onload = function() {
            setTimeout(function() { 
                document.getElementById('loading').style.display = 'none'; 
                document.getElementById('main').style.display = 'block'; 
            }, 5000);
        };
        document.getElementById('search-bar').addEventListener('keyup', function(event) {
            const filter = event.target.value.toLowerCase();
            const tiles = document.querySelectorAll('.game-tile');
            tiles.forEach(tile => {
                const text = tile.textContent.toLowerCase();
                tile.style.display = text.includes(filter) ? '' : 'none';
            });
        });
    </script>
</body>
</html>
