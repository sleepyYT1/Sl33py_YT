<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNAF 4 Style Game</title>
    <style>
        body { background-color: #1c1c1c; color: white; font-family: Arial, sans-serif; }
        #game { display: flex; justify-content: center; align-items: center; height: 100vh; }
        #bedroom { width: 80%; height: 80%; background: url('bedroom_background.jpg') no-repeat center center; background-size: cover; position: relative; }
        #doorLeft, #doorRight { width: 15%; height: 100%; position: absolute; top: 0; }
        #doorLeft { left: 0; background: rgba(255, 0, 0, 0.5); }
        #doorRight { right: 0; background: rgba(0, 0, 255, 0.5); }
        #flashlight { position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; background: radial-gradient(circle, rgba(255, 255, 255, 0.8), rgba(0, 0, 0, 0)); pointer-events: none; }
    </style>
</head>
<body>
    <div id="game">
        <div id="bedroom">
            <div id="doorLeft"></div>
            <div id="doorRight"></div>
            <div id="flashlight"></div>
        </div>
    </div>
    <script>
        let flashlightOn = false;
        let leftDoorOpen = true;
        let rightDoorOpen = true;
        
        function toggleFlashlight() {
            flashlightOn = !flashlightOn;
            const flashlight = document.getElementById('flashlight');
            flashlight.style.display = flashlightOn ? 'block' : 'none';
        }
        
        function toggleLeftDoor() {
            leftDoorOpen = !leftDoorOpen;
            document.getElementById('doorLeft').style.opacity = leftDoorOpen ? '1' : '0';
        }
        
        function toggleRightDoor() {
            rightDoorOpen = !rightDoorOpen;
            document.getElementById('doorRight').style.opacity = rightDoorOpen ? '1' : '0';
        }
        
        // Example of animatronic encounter
        setInterval(() => {
            if (Math.random() < 0.1) {
                alert('An animatronic is at your door!');
            }
        }, 3000);

        document.addEventListener('keydown', (event) => {
            if (event.key === 'f') toggleFlashlight();
            if (event.key === 'a') toggleLeftDoor();
            if (event.key === 'd') toggleRightDoor();
        });
    </script>
</body>
</html>
