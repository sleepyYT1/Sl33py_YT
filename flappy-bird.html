<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Flappy Bird</title>\n    <style>\n        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #70c5ce; }\n        canvas { border: 2px solid #000; }\n    </style>\n</head>\n<body>\n    <canvas id="gameCanvas" width="320" height="480"></canvas>\n    <script>\n        const canvas = document.getElementById('gameCanvas');\n        const ctx = canvas.getContext('2d');\n        const bird = { width: 20, height: 20, x: 50, y: 150, gravity: 0.6, lift: -12, velocity: 0 };\n        const pipes = [];\n        let score = 0;\n        let gameOver = false;\n        let frameCount = 0;\n\n        function resetGame() {\n            bird.y = 150;\n            bird.velocity = 0;\n            pipes.length = 0;\n            score = 0;\n            gameOver = false;\n            frameCount = 0;\n            requestAnimationFrame(gameLoop);\n        }\n\n        function addPipe() {\n            const pipeHeight = Math.random() * (canvas.height - 100) + 20;\n            pipes.push({ x: canvas.width, height: pipeHeight });\n        }\n\n        function drawBird() {\n            ctx.fillStyle = '#ff0';\n            ctx.fillRect(bird.x, bird.y, bird.width, bird.height);\n        }\n\n        function drawPipes() {\n            ctx.fillStyle = '#228B22';\n            pipes.forEach(pipe => {\n                ctx.fillRect(pipe.x, 0, 50, pipe.height);\n                ctx.fillRect(pipe.x, pipe.height + 80, 50, canvas.height - pipe.height - 80);\n            });\n        }\n\n        function update() {\n            bird.velocity += bird.gravity;\n            bird.y += bird.velocity;\n            if (bird.y > canvas.height - bird.height || bird.y < 0) {\n                gameOver = true;\n            }\n            pipes.forEach(pipe => {\n                pipe.x -= 5;\n                if (pipe.x + 50 < bird.x && !pipe.passed) {\n                    score++;\n                    pipe.passed = true;\n                }\n                if (bird.x < pipe.x + 50 && bird.x + bird.width > pipe.x && (bird.y < pipe.height || bird.y + bird.height > pipe.height + 80)) {\n                    gameOver = true;\n                }\n            });\n            if (frameCount % 75 === 0) {\n                addPipe();\n            }\n            frameCount++;\n        }\n\n        function drawScore() {\n            ctx.fillStyle = '#000';\n            ctx.font = '20px Arial';\n            ctx.fillText('Score: ' + score, 10, 20);\n        }\n\n        function gameLoop() {\n            ctx.clearRect(0, 0, canvas.width, canvas.height);\n            if (!gameOver) {\n                update();\n                drawPipes();\n                drawBird();\n                drawScore();\n                requestAnimationFrame(gameLoop);\n            } else {\n                ctx.fillStyle = '#000';\n                ctx.font = '30px Arial';\n                ctx.fillText('Game Over', 70, canvas.height / 2);\n                ctx.fillText('Score: ' + score, 100, canvas.height / 2 + 40);\n                ctx.font = '20px Arial';\n                ctx.fillText('Press Space to Restart', 40, canvas.height / 2 + 80);\n            }\n        }\n        window.addEventListener('keydown', function (e) {\n            if (e.code === 'Space' && !gameOver) {\n                bird.velocity = bird.lift;\n            } else if (e.code === 'Space' && gameOver) {\n                resetGame();\n            }\n        });\n        resetGame();\n    </script>\n</body>\n</html>
